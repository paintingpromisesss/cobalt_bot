services:
  mihomo:
    image: metacubex/mihomo:v1.19.20
    container_name: mihomo
    restart: unless-stopped
    expose:
      - "2080"
    volumes:
      - ./mihomo/config.yaml:/root/.config/mihomo/config.yaml:ro
      - ./mihomo/providers:/root/.config/mihomo/providers
    environment:
      TZ: Europe/Moscow
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  cobalt:
    image: ghcr.io/imputnet/cobalt:11.5
    container_name: cobalt
    restart: unless-stopped
    init: true
    expose:
      - "9000"
    environment:
      API_URL: "http://cobalt:9000"
      API_PORT: "9000"

      HTTP_PROXY: "http://mihomo:2080"
      HTTPS_PROXY: "http://mihomo:2080"
      NO_PROXY: "localhost,127.0.0.1,::1,cobalt,mihomo,host.docker.internal"

      CORS_WILDCARD: "0"
      API_AUTH_REQUIRED: "0"

      FORCE_LOCAL_PROCESSING: "never"

      DURATION_LIMIT: "10800"
      TUNNEL_LIFESPAN: "90"
      RATELIMIT_WINDOW: "60"
      RATELIMIT_MAX: "120"
      TUNNEL_RATELIMIT_WINDOW: "60"
      TUNNEL_RATELIMIT_MAX: "120"

      ENABLE_DEPRECATED_YOUTUBE_HLS: "never"
      YOUTUBE_ALLOW_BETTER_AUDIO: "0"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    depends_on:
      mihomo:
        condition: service_healthy
  tg_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg_bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      COBALT_BASE_URL: ${COBALT_BASE_URL}
      MIHOMO_BASE_URL: ${MIHOMO_BASE_URL}
      MAX_FILE_BYTES: ${MAX_FILE_BYTES}
      DB_PATH: ${DB_PATH}
      TEMP_DIR: ${TEMP_DIR}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT}
      DOWNLOAD_TIMEOUT: ${DOWNLOAD_TIMEOUT}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
    depends_on:
      cobalt:
        condition: service_healthy
